version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/database.sqlite:/app/database.sqlite
    environment:
      - PORT=3001
      - NODE_ENV=development

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001

networks:
  default:
    name: finance-network